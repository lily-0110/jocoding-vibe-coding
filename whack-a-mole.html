
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .mole-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 20px auto;
        }
        .hole {
            aspect-ratio: 1;
            background-color: #8d6e63;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 4px solid #5d4037;
        }
        .mole {
            width: 80%;
            height: 80%;
            background-color: #795548;
            border-radius: 50% 50% 0 0;
            position: absolute;
            bottom: -100%;
            left: 10%;
            transition: bottom 0.2s;
            cursor: pointer;
        }
        .mole.up {
            bottom: 10%;
        }
        .mole::after {
            content: '👀';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
        }
        .instructions {
            background: var(--number-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="toggle-btn">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Whack-a-Mole</h1>
        <div class="instructions">
            <strong>🎮 게임 방법:</strong>
            <ul>
                <li>구멍에서 랜덤하게 튀어나오는 두더지를 클릭하세요.</li>
                <li>두더지를 잡을 때마다 점수가 올라갑니다.</li>
                <li>30초 동안 얼마나 많은 두더지를 잡을 수 있는지 도전해보세요!</li>
            </ul>
        </div>
        <p>Score: <span id="score">0</span> | Time: <span id="timeLeft">30</span>s</p>
        <div class="mole-grid" id="grid">
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
        </div>
        <div id="game-over" style="display: none;">
            <h2 id="final-score-msg"></h2>
            <button id="restart-btn" class="play-button">Play Again</button>
        </div>
        <p><a href="index.html" class="play-button">Back to Game List</a></p>
    </div>

    <script>
        const moles = document.querySelectorAll('.mole');
        const scoreElement = document.getElementById('score');
        const timeLeftElement = document.getElementById('timeLeft');
        const gameOverDiv = document.getElementById('game-over');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const restartBtn = document.getElementById('restart-btn');
        const grid = document.getElementById('grid');

        let score = 0;
        let timeLeft = 30;
        let lastHole;
        let timeUp = false;

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(moles) {
            const idx = Math.floor(Math.random() * moles.length);
            const hole = moles[idx].parentElement;
            if (hole === lastHole) return randomHole(moles);
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(500, 1000);
            const hole = randomHole(moles);
            hole.querySelector('.mole').classList.add('up');
            setTimeout(() => {
                hole.querySelector('.mole').classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            timeUp = false;
            scoreElement.textContent = score;
            timeLeftElement.textContent = timeLeft;
            gameOverDiv.style.display = 'none';
            grid.style.display = 'grid';
            
            peep();
            const timer = setInterval(() => {
                timeLeft--;
                timeLeftElement.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timeUp = true;
                    endGame();
                }
            }, 1000);
        }

        function whack(e) {
            if (!e.isTrusted) return; 
            score++;
            this.classList.remove('up');
            scoreElement.textContent = score;
        }

        function endGame() {
            grid.style.display = 'none';
            gameOverDiv.style.display = 'block';
            finalScoreMsg.textContent = `Time's up! Your final score: ${score}`;
        }

        moles.forEach(mole => mole.addEventListener('click', whack));
        restartBtn.addEventListener('click', startGame);

        startGame();

        const toggleBtn = document.getElementById('toggle-btn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkMode);
                toggleBtn.textContent = isDarkMode ? 'Light Mode' : 'Dark Mode';
            });
            const savedDarkMode = localStorage.getItem('darkMode');
            if (savedDarkMode === 'true') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = 'Light Mode';
            }
        }
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <link rel="stylesheet" href="style.css">
    <style>
        canvas {
            border: 5px solid var(--button-bg);
            background-color: #70c5ce;
            display: block;
            margin: 20px auto;
            max-width: 100%;
        }
        .score-display {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .instructions {
            background: var(--number-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="toggle-btn">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Flappy Bird Clone</h1>
        <div class="instructions">
            <strong>🎮 게임 방법:</strong>
            <ul>
                <li>Space, 위쪽 방향키(↑), W 키 또는 화면 클릭으로 점프하세요.</li>
                <li>파이프 사이의 빈 공간을 안전하게 통과해야 합니다.</li>
                <li>파이프나 화면 아래 바닥에 부딪히면 게임이 종료됩니다.</li>
            </ul>
        </div>
        <div class="score-display">Score: <span id="currentScore">0</span></div>
        <canvas id="gameCanvas" width="320" height="480"></canvas>
        <div id="game-over" style="display: none;">
            <h2 id="final-score-msg"></h2>
            <button id="restart-btn" class="play-button">Play Again</button>
        </div>
        <p><a href="index.html" class="play-button">Back to Game List</a></p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreElement = document.getElementById('currentScore');
        const gameOverDiv = document.getElementById('game-over');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const restartBtn = document.getElementById('restart-btn');

        let bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.4, lift: -8, velocity: 0 };
        let pipes = [];
        let score = 0;
        let gameInterval;
        let isGameOver = false;

        function startGame() {
            bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.4, lift: -8, velocity: 0 };
            pipes = [];
            score = 0;
            isGameOver = false;
            currentScoreElement.textContent = score;
            gameOverDiv.style.display = 'none';
            canvas.style.display = 'block';
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(draw, 20);
        }

        function draw() {
            ctx.fillStyle = '#70c5ce';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                endGame();
            }

            ctx.fillStyle = 'yellow';
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
                let pipeGap = 150;
                let pipeWidth = 40;
                let minPipeHeight = 50;
                let maxPipeHeight = canvas.height - pipeGap - minPipeHeight;
                let topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1)) + minPipeHeight;
                pipes.push({ x: canvas.width, top: topHeight, bottom: canvas.height - topHeight - pipeGap });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2;

                ctx.fillStyle = 'green';
                ctx.fillRect(pipes[i].x, 0, 40, pipes[i].top);
                ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, 40, pipes[i].bottom);

                if (bird.x + bird.width > pipes[i].x && bird.x < pipes[i].x + 40) {
                    if (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom) {
                        endGame();
                    }
                }

                if (pipes[i].x + 40 < bird.x && !pipes[i].passed) {
                    pipes[i].passed = true;
                    score++;
                    currentScoreElement.textContent = score;
                }

                if (pipes[i].x < -40) {
                    pipes.splice(i, 1);
                }
            }
        }

        function endGame() {
            clearInterval(gameInterval);
            isGameOver = true;
            canvas.style.display = 'none';
            gameOverDiv.style.display = 'block';
            finalScoreMsg.textContent = `Game Over! Score: ${score}`;
        }

        function jump() {
            if (!isGameOver) bird.velocity = bird.lift;
        }

        window.addEventListener('keydown', (e) => { 
            if (e.code === 'Space' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                jump();
                e.preventDefault();
            }
        });
        canvas.addEventListener('click', jump);
        restartBtn.addEventListener('click', startGame);

        startGame();

        const toggleBtn = document.getElementById('toggle-btn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkMode);
                toggleBtn.textContent = isDarkMode ? 'Light Mode' : 'Dark Mode';
            });
            const savedDarkMode = localStorage.getItem('darkMode');
            if (savedDarkMode === 'true') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = 'Light Mode';
            }
        }
    </script>
</body>
</html>

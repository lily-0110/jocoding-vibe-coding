<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>
    <link rel="stylesheet" href="style.css">

     crossorigin="anonymous"></script>

    <style>
        .game-area {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--number-bg);
            border-radius: 10px;
            box-shadow: 0 4px 8px var(--shadow);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .game-area input {
            width: calc(100% - 24px);
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--shadow);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1em;
        }
        .game-area button {
            background-color: var(--button-bg);
            color: var(--button-text);
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: opacity 0.3s;
        }
        .game-area button:hover {
            opacity: 0.9;
        }
        .game-area p {
            margin-top: 15px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="toggle-btn">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Guess the Number!</h1>
        <div class="game-area">
            <p>I'm thinking of a number between 1 and 100. Can you guess it?</p>
            <input type="number" id="guessInput" min="1" max="100" placeholder="Enter your guess">
            <button id="checkGuess">Check Guess</button>
            <p id="message"></p>
            <button id="newGame" style="display: none;">Play Again</button>
        </div>
        <p><a href="index.html" class="play-button">Back to Game List</a></p>
    </div>
    <footer>
        <p>&copy; 2024 Mini Game Collection. All rights reserved.</p>
    </footer>

    <script>
        const guessInput = document.getElementById('guessInput');
        const checkGuessBtn = document.getElementById('checkGuess');
        const message = document.getElementById('message');
        const newGameBtn = document.getElementById('newGame');

        let secretNumber;
        let attempts;

        function startGame() {
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            message.textContent = '';
            guessInput.value = '';
            guessInput.disabled = false;
            checkGuessBtn.disabled = false;
            newGameBtn.style.display = 'none';
        }

        function checkGuess() {
            const userGuess = parseInt(guessInput.value);
            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                message.textContent = 'Please enter a valid number between 1 and 100.';
                return;
            }

            attempts++;

            if (userGuess === secretNumber) {
                message.textContent = `Congratulations! You guessed the number in ${attempts} attempts.`;
                guessInput.disabled = true;
                checkGuessBtn.disabled = true;
                newGameBtn.style.display = 'block';
            } else if (userGuess < secretNumber) {
                message.textContent = 'Too low! Try again.';
            } else {
                message.textContent = 'Too high! Try again.';
            }
        }

        checkGuessBtn.addEventListener('click', checkGuess);
        newGameBtn.addEventListener('click', startGame);

        startGame(); // Initialize game on load

        // Theme toggle logic (copied from main.js or should be extracted to common.js)
        const toggleBtn = document.getElementById('toggle-btn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkMode);
                toggleBtn.textContent = isDarkMode ? 'Light Mode' : 'Dark Mode';
            });

            // Set initial theme
            const savedDarkMode = localStorage.getItem('darkMode');
            if (savedDarkMode === 'true') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = 'Light Mode';
            } else {
                toggleBtn.textContent = 'Dark Mode';
            }
        }
    </script>
</body>
</html>

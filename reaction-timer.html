
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Timer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .reaction-box {
            width: 300px;
            height: 300px;
            background-color: #f44336;
            margin: 20px auto;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: white;
            cursor: pointer;
            user-select: none;
        }
        .reaction-box.ready {
            background-color: #4caf50;
        }
        .reaction-box.waiting {
            background-color: #ffeb3b;
            color: black;
        }
        .instructions {
            background: var(--number-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="toggle-btn">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Reaction Timer</h1>
        <div class="instructions">
            <strong>🎮 게임 방법:</strong>
            <ul>
                <li>화면의 박스를 클릭하여 테스트를 시작하세요.</li>
                <li>박스 색상이 노란색에서 초록색(CLICK!)으로 변할 때까지 기다리세요.</li>
                <li>초록색이 되는 순간 최대한 빠르게 박스를 클릭하여 기록을 확인하세요.</li>
            </ul>
        </div>
        <div class="reaction-box" id="reactionBox">Click to Start</div>
        <div id="game-over" style="display: none;">
            <h2 id="final-score-msg"></h2>
            <button id="restart-btn" class="play-button">Try Again</button>
        </div>
        <p><a href="index.html" class="play-button">Back to Game List</a></p>
    </div>

    <script>
        const reactionBox = document.getElementById('reactionBox');
        const gameOverDiv = document.getElementById('game-over');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const restartBtn = document.getElementById('restart-btn');

        let startTime;
        let timeout;
        let state = 'idle';

        function startTest() {
            state = 'waiting';
            reactionBox.textContent = 'Wait for Green...';
            reactionBox.classList.remove('ready');
            reactionBox.classList.add('waiting');
            gameOverDiv.style.display = 'none';

            const delay = Math.floor(Math.random() * 3000) + 2000;
            timeout = setTimeout(() => {
                state = 'ready';
                reactionBox.textContent = 'CLICK!';
                reactionBox.classList.remove('waiting');
                reactionBox.classList.add('ready');
                startTime = Date.now();
            }, delay);
        }

        reactionBox.addEventListener('click', () => {
            if (state === 'idle') {
                startTest();
            } else if (state === 'waiting') {
                clearTimeout(timeout);
                state = 'idle';
                reactionBox.textContent = 'Too early! Click to restart';
                reactionBox.classList.remove('waiting');
            } else if (state === 'ready') {
                const reactionTime = Date.now() - startTime;
                state = 'finished';
                reactionBox.style.display = 'none';
                gameOverDiv.style.display = 'block';
                finalScoreMsg.textContent = `Your reaction time: ${reactionTime}ms`;
            }
        });

        restartBtn.addEventListener('click', () => {
            state = 'idle';
            reactionBox.style.display = 'flex';
            reactionBox.textContent = 'Click to Start';
            reactionBox.classList.remove('ready', 'waiting');
            gameOverDiv.style.display = 'none';
        });

        const toggleBtn = document.getElementById('toggle-btn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkMode);
                toggleBtn.textContent = isDarkMode ? 'Light Mode' : 'Dark Mode';
            });
            const savedDarkMode = localStorage.getItem('darkMode');
            if (savedDarkMode === 'true') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = 'Light Mode';
            }
        }
    </script>
</body>
</html>

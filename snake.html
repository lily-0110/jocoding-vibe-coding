
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        canvas {
            border: 5px solid var(--button-bg);
            background-color: #000;
            display: block;
            margin: 20px auto;
            max-width: 100%;
        }
        .score-display {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .instructions {
            background: var(--number-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }
        .control-btn {
            padding: 15px;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="toggle-btn">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Snake Game</h1>
        <div class="instructions">
            <strong>🎮 게임 방법:</strong>
            <ul>
                <li>방향키(↑, ↓, ←, →) 또는 W, A, S, D를 사용하여 뱀을 움직이세요.</li>
                <li>빨간색 먹이를 먹으면 점수가 올라가고 뱀의 몸집이 커집니다.</li>
                <li>벽에 부딪히거나 자신의 몸에 부딪히면 게임이 종료됩니다.</li>
            </ul>
        </div>
        <div class="score-display">Score: <span id="currentScore">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="game-over" style="display: none;">
            <h2 id="final-score-msg"></h2>
            <button id="restart-btn" class="play-button">Play Again</button>
        </div>
        <div class="controls">
            <button id="up" class="control-btn">↑</button>
            <button id="left" class="control-btn">←</button>
            <button id="down" class="control-btn">↓</button>
            <button id="right" class="control-btn">→</button>
        </div>
        <p><a href="index.html" class="play-button">Back to Game List</a></p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreElement = document.getElementById('currentScore');
        const gameOverDiv = document.getElementById('game-over');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const restartBtn = document.getElementById('restart-btn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let gameInterval;

        function startGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            nextDx = 0;
            nextDy = 0;
            score = 0;
            currentScoreElement.textContent = score;
            createFood();
            gameOverDiv.style.display = 'none';
            canvas.style.display = 'block';
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(drawGame, 150);
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function drawGame() {
            dx = nextDx;
            dy = nextDy;
            updateSnake();
            if (checkGameOver()) return;

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            ctx.fillStyle = 'lime';
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function updateSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (dx === 0 && dy === 0) return;

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                currentScoreElement.textContent = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function checkGameOver() {
            if (dx === 0 && dy === 0) return false;

            const head = snake[0];
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return true;
            }

            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                    return true;
                }
            }
            return false;
        }

        function endGame() {
            clearInterval(gameInterval);
            canvas.style.display = 'none';
            gameOverDiv.style.display = 'block';
            finalScoreMsg.textContent = `Game Over! Your score: ${score}`;
        }

        function changeDirection(newDx, newDy) {
            if ((newDx === -dx && newDx !== 0) || (newDy === -dy && newDy !== 0)) return;
            nextDx = newDx;
            nextDy = newDy;
        }

        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': changeDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection(1, 0); break;
            }
        });

        document.getElementById('up').addEventListener('click', () => changeDirection(0, -1));
        document.getElementById('down').addEventListener('click', () => changeDirection(0, 1));
        document.getElementById('left').addEventListener('click', () => changeDirection(-1, 0));
        document.getElementById('right').addEventListener('click', () => changeDirection(1, 0));
        restartBtn.addEventListener('click', startGame);

        startGame();

        const toggleBtn = document.getElementById('toggle-btn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkMode);
                toggleBtn.textContent = isDarkMode ? 'Light Mode' : 'Dark Mode';
            });
            const savedDarkMode = localStorage.getItem('darkMode');
            if (savedDarkMode === 'true') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = 'Light Mode';
            }
        }
    </script>
</body>
</html>

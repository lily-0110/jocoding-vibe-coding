
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid-2048 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background-color: #bbada0;
            padding: 10px;
            border-radius: 6px;
            max-width: 300px;
            margin: 20px auto;
        }
        .cell-2048 {
            aspect-ratio: 1;
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.5em;
            color: #776e65;
        }
        .instructions {
            background: var(--number-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .cell-2048[data-value="2"] { background-color: #eee4da; }
        .cell-2048[data-value="4"] { background-color: #ede0c8; }
        .cell-2048[data-value="8"] { background-color: #f2b179; color: #f9f6f2; }
        .cell-2048[data-value="16"] { background-color: #f59563; color: #f9f6f2; }
        .cell-2048[data-value="32"] { background-color: #f67c5f; color: #f9f6f2; }
        .cell-2048[data-value="64"] { background-color: #f65e3b; color: #f9f6f2; }
        .cell-2048[data-value="128"] { background-color: #edcf72; color: #f9f6f2; font-size: 1.2em; }
        .cell-2048[data-value="256"] { background-color: #edcc61; color: #f9f6f2; font-size: 1.2em; }
        .cell-2048[data-value="512"] { background-color: #edc850; color: #f9f6f2; font-size: 1.2em; }
        .cell-2048[data-value="1024"] { background-color: #edc53f; color: #f9f6f2; font-size: 1em; }
        .cell-2048[data-value="2048"] { background-color: #edc22e; color: #f9f6f2; font-size: 1em; }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="toggle-btn">Dark Mode</button>
    </div>
    <div class="container">
        <h1>2048 Game</h1>
        <div class="instructions">
            <strong>🎮 게임 방법:</strong>
            <ul>
                <li>방향키(↑, ↓, ←, →)를 눌러 모든 타일을 해당 방향으로 이동시킵니다.</li>
                <li>같은 숫자를 가진 두 타일이 충돌하면 하나로 합쳐지며 숫자가 두 배가 됩니다.</li>
                <li>최종적으로 숫자 2048이 적힌 타일을 만드는 것이 목표입니다.</li>
            </ul>
        </div>
        <p>Score: <span id="score">0</span></p>
        <div class="grid-2048" id="grid"></div>
        <div id="game-over" style="display: none;">
            <h2 id="final-score-msg"></h2>
            <button id="restart-btn" class="play-button">Play Again</button>
        </div>
        <p><a href="index.html" class="play-button">Back to Game List</a></p>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const gameOverDiv = document.getElementById('game-over');
        const finalScoreMsg = document.getElementById('final-score-msg');
        const restartBtn = document.getElementById('restart-btn');

        let board = Array(16).fill(0);
        let score = 0;

        function initGame() {
            board = Array(16).fill(0);
            score = 0;
            scoreElement.textContent = score;
            addRandomTile();
            addRandomTile();
            renderBoard();
            gameOverDiv.style.display = 'none';
            gridElement.style.display = 'grid';
        }

        function addRandomTile() {
            const emptyCells = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
            if (emptyCells.length > 0) {
                const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function renderBoard() {
            gridElement.innerHTML = '';
            board.forEach(value => {
                const cell = document.createElement('div');
                cell.classList.add('cell-2048');
                if (value > 0) {
                    cell.textContent = value;
                    cell.dataset.value = value;
                }
                gridElement.appendChild(cell);
            });
        }

        function move(direction) {
            let hasChanged = false;
            const rows = [];
            for (let i = 0; i < 4; i++) {
                if (direction === 'left' || direction === 'right') rows.push(board.slice(i * 4, (i + 1) * 4));
                else rows.push([board[i], board[i + 4], board[i + 8], board[i + 12]]);
            }

            rows.forEach((row, i) => {
                if (direction === 'right' || direction === 'down') row.reverse();
                let filteredRow = row.filter(val => val !== 0);
                for (let j = 0; j < filteredRow.length - 1; j++) {
                    if (filteredRow[j] === filteredRow[j + 1]) {
                        filteredRow[j] *= 2;
                        score += filteredRow[j];
                        filteredRow.splice(j + 1, 1);
                    }
                }
                while (filteredRow.length < 4) filteredRow.push(0);
                if (direction === 'right' || direction === 'down') filteredRow.reverse();
                for (let j = 0; j < 4; j++) {
                    const idx = (direction === 'left' || direction === 'right') ? i * 4 + j : j * 4 + i;
                    if (board[idx] !== filteredRow[j]) hasChanged = true;
                    board[idx] = filteredRow[j];
                }
            });

            if (hasChanged) {
                addRandomTile();
                renderBoard();
                scoreElement.textContent = score;
                if (isGameOver()) endGame();
            }
        }

        function isGameOver() {
            if (board.includes(0)) return false;
            for (let i = 0; i < 16; i++) {
                if (i % 4 < 3 && board[i] === board[i + 1]) return false;
                if (i < 12 && board[i] === board[i + 4]) return false;
            }
            return true;
        }

        function endGame() {
            gridElement.style.display = 'none';
            gameOverDiv.style.display = 'block';
            finalScoreMsg.textContent = `Game Over! Your score: ${score}`;
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move('left');
            else if (e.key === 'ArrowRight') move('right');
            else if (e.key === 'ArrowUp') move('up');
            else if (e.key === 'ArrowDown') move('down');
        });

        restartBtn.addEventListener('click', initGame);
        initGame();

        const toggleBtn = document.getElementById('toggle-btn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkMode);
                toggleBtn.textContent = isDarkMode ? 'Light Mode' : 'Dark Mode';
            });
            const savedDarkMode = localStorage.getItem('darkMode');
            if (savedDarkMode === 'true') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = 'Light Mode';
            }
        }
    </script>
</body>
</html>
